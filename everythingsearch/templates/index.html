<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EverythingSearch</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='icon.png') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<div class="page-layout">
  <aside class="sidebar hidden" id="sidebar">
    <div class="sidebar-collapsed-toggle" id="sidebarExpand" title="展开搜索历史">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="sidebar-collapsed-badge" id="historyBadge">0</span>
    </div>
    <div class="sidebar-header">
      <span class="sidebar-title">搜索历史</span>
      <div class="sidebar-actions">
        <button class="sidebar-btn" id="clearHistory" title="清空历史">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
        <button class="sidebar-btn" id="sidebarCollapse" title="收起侧栏">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
        </button>
      </div>
    </div>
    <div class="history-list" id="historyList"></div>
  </aside>

  <div class="main-content">
    <div class="wrapper">
      <div class="hero" id="hero">
        <div class="logo"><img src="{{ url_for('static', filename='icon.png') }}" alt="EverythingSearch">EverythingSearch</div>
        <div class="search-box">
          <div class="search-input-wrap">
            <textarea id="searchInput" rows="1" placeholder="描述你想找的文件特征或者关键词，可以指定目录、文件名或者修改时间...." autofocus></textarea>
            
            <div class="search-toolbar">
              <div class="toolbar-left">
                <button class="ai-toggle-btn active" id="aiToggleBtn" title="切换智能搜索模式">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                  </svg>
                  <span>智能搜索</span>
                </button>
              </div>
              <div class="toolbar-right">
                <span class="shortcut" id="shortcut">Enter</span>
                <button class="submit-btn" id="submitBtn" title="发送 (Enter)">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"/>
                    <polyline points="5 12 12 5 19 12"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="search-progress" id="searchProgress">
              <div class="progress-dots"><span></span><span></span><span></span></div>
              <span class="progress-text">正在搜索…</span>
            </div>
          </div>
        </div>
      </div>
      
      <div id="interpretModule" class="interpret-module" style="display:none">
        <div class="interpret-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          智能解读
        </div>
        <div id="interpretContent"></div>
      </div>
      
      <div class="results" id="results"></div>

      <div id="intro" class="intro">
        <div class="intro-grid">
          <div class="intro-item">
            <span class="intro-icon">🔍</span>
            <div class="intro-text"><strong>语义搜索</strong><br>支持自然语言描述，如"去年的营销方案"</div>
          </div>
          <div class="intro-item">
            <span class="intro-icon">📂</span>
            <div class="intro-text"><strong>文件 + 笔记</strong><br>同时搜索本地文件和 MWeb 笔记内容</div>
          </div>
          <div class="intro-item">
            <span class="intro-icon">🎯</span>
            <div class="intro-text"><strong>精确匹配</strong><br>关键词完全命中的结果会优先展示</div>
          </div>
          <div class="intro-item">
            <span class="intro-icon">📌</span>
            <div class="intro-text"><strong>快速定位</strong><br>点击结果可直接在 Finder 中打开文件</div>
          </div>
        </div>
        <div class="intro-shortcuts"><kbd>⌘</kbd> <kbd>K</kbd> 快速聚焦搜索框 &nbsp;·&nbsp; <kbd>Enter</kbd> 开始搜索</div>
      </div>
    </div>
    <footer class="footer-bottom">
      <span id="copyright"></span>
    </footer>
  </div>
</div>

<script>
  window.CONFIG = {
    ENABLE_MWEB: {{ 'true' if enable_mweb else 'false' }},
    SMART_SEARCH_AVAILABLE: {{ 'true' if smart_search_available else 'false' }}
  };
</script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>document.getElementById('copyright').innerHTML = '\u00A9 ' + new Date().getFullYear() + ' EverythingSearch. All rights reserved.';</script>
</body>
</html>
